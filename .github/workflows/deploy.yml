name: Deploy to GitHub Pages

on:
  # Build and deploy on every push to main.
  push:
    branches: [main]
    # Docs-only changes don't affect the built site — skip the run to save
    # Actions minutes. Keep this list in sync with test.yml.
    paths-ignore:
      - '**.md'
      - 'Prompts/**'
      - '.gitignore'
      - '.githooks/**'
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Only one deploy at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Needed for peaceiris to push the built site to the gh-pages branch.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Regression gate on main: never publish a build whose tests fail.
      # Folded into this job so main costs one runner, not two.
      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # force_orphan keeps gh-pages at a single commit, so the built
          # site never accumulates history and uses no Actions artifact
          # storage — the site lives only as the current git tree.
          force_orphan: true
